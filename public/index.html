<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automatic Monitoring Dashboard</title>
    <style>
        :root {
            --bg-base: #09090b; 
            --bg-panel: #18181b; 
            --bg-card: #27272a;  
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --accent-blue: #38bdf8;
            --status-on: #10b981; 
            --status-off: #ef4444; 
            --border-color: #3f3f46;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-base);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            overflow: hidden; /* Prevent body scrolling */
        }

        /* --- LAYOUT STRUCTURE --- */
        .sidebar-left, .sidebar-right {
            width: 350px;
            background: var(--bg-panel);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            z-index: 10;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            height: 100vh; /* Force full height for scrolling */
        }
        .sidebar-right { border-right: none; border-left: 1px solid var(--border-color); }
        
        .center-stage {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- CUSTOM SCROLLBARS --- */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #52525b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #71717a; }

        /* --- HEADER & SCROLL AREAS --- */
        .panel-header {
            padding: 20px 24px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-panel);
            z-index: 5;
        }
        
        /* This is the key to perfect scrolling */
        .scroll-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* --- LEFT: NOTIFICATIONS --- */
        .notif-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
            flex-shrink: 0; /* Prevents squishing */
        }
        .notif-icon {
            width: 36px; height: 36px;
            border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.1rem; flex-shrink: 0;
        }
        .notif-icon.on { background: rgba(16, 185, 129, 0.15); color: var(--status-on); border: 1px solid rgba(16, 185, 129, 0.3); }
        .notif-icon.off { background: rgba(239, 68, 68, 0.15); color: var(--status-off); border: 1px solid rgba(239, 68, 68, 0.3); }
        
        .notif-text { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .notif-title { font-size: 0.9rem; font-weight: 600; line-height: 1.4; }
        .notif-title .highlight-on { color: var(--status-on); }
        .notif-title .highlight-off { color: var(--status-off); }
        .notif-time { font-size: 0.8rem; color: var(--text-muted); }

        /* --- CENTER: 3D STAGE & TITLE --- */
        .stage-header {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 30px 0;
            text-align: center;
            z-index: 20;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(9,9,11,0.9) 0%, rgba(9,9,11,0) 100%);
        }
        .stage-title {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
            text-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }
        .stage-subtitle {
            font-size: 0.9rem;
            color: var(--accent-blue);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 2px;
            margin-top: 8px;
        }
        #canvas-container { flex: 1; width: 100%; height: 100%; }
        
        .power-overlay {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex; gap: 15px; align-items: center;
            z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .power-overlay span { color: var(--status-on); font-size: 1.3rem; }

        /* --- RIGHT: ROOM STATUS --- */
        .room-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 16px;
            flex-shrink: 0; /* Crucial for proper scrolling */
        }
        .room-header {
            background: rgba(255,255,255,0.03);
            padding: 16px 20px;
            font-weight: 600;
            font-size: 1.05rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .room-icon { color: var(--text-muted); font-size: 1.2rem; }
        
        .device-list { display: flex; flex-direction: column; }
        .device-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 0.95rem;
        }
        .device-row:last-child { border-bottom: none; }
        
        .device-info { display: flex; align-items: center; gap: 12px; }
        .device-icon { font-size: 1.1rem; }
        .device-name { color: var(--text-main); font-weight: 500; }
        
        .device-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .device-status.on { background: rgba(16, 185, 129, 0.15); color: var(--status-on); }
        .device-status.off { background: rgba(239, 68, 68, 0.15); color: var(--status-off); }

    </style>
</head>
<body>

    <div class="sidebar-left">
        <div class="panel-header">
            Activity Log
            <span style="font-size:1.2rem">📋</span>
        </div>
        <div class="scroll-container" id="notification-list">
            </div>
    </div>

    <div class="center-stage">
        <div class="stage-header">
            <h1 class="stage-title">Automatic Monitoring Dashboard</h1>
            <div class="stage-subtitle">Single-Floor Office Layout</div>
        </div>
        
        <div id="canvas-container"></div>
        
        <div class="power-overlay">
            Total Office Draw: <span id="total-power">0W</span>
        </div>
    </div>

    <div class="sidebar-right">
        <div class="panel-header">
            Room Status
            <div style="display:flex; align-items:center; gap:6px; color:var(--status-on); font-size:0.8rem;">
                <div style="width:8px; height:8px; background:var(--status-on); border-radius:50%; box-shadow: 0 0 10px var(--status-on);"></div> LIVE
            </div>
        </div>
        <div class="scroll-container" id="room-list">
            </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. SETUP 3D SCENE (Single Floor Layout) ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#09090b'); 

        const aspect = container.clientWidth / container.clientHeight;
        // Increased 'd' to fit 3 rooms side-by-side
        const d = 30; 
        const camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
        
        // Isometric perspective looking down at the wide floor
        camera.position.set(30, 45, 40); 
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // --- 2. 3D ASSETS ---
        function createFan() {
            const group = new THREE.Group();
            const rod = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1.2), new THREE.MeshStandardMaterial({ color: 0x52525b }));
            rod.position.y = 0.6;
            const motor = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 0.4), new THREE.MeshStandardMaterial({ color: 0x27272a }));
            const rotor = new THREE.Group();
            for (let i = 0; i < 3; i++) {
                const blade = new THREE.Mesh(new THREE.BoxGeometry(3.8, 0.05, 0.5), new THREE.MeshStandardMaterial({ color: 0x18181b }));
                blade.position.x = 2.4; blade.rotation.x = Math.PI / 10;
                const pivot = new THREE.Group();
                pivot.rotation.y = (i * Math.PI * 2) / 3;
                pivot.add(blade); rotor.add(pivot);
            }
            group.add(rod, motor, rotor);
            return { parent: group, spinner: rotor };
        }

        function createLight() {
            const group = new THREE.Group();
            const casing = new THREE.Mesh(new THREE.BoxGeometry(2, 0.2, 2), new THREE.MeshStandardMaterial({ color: 0x71717a }));
            const panelMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0 });
            const panel = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.1, 1.8), panelMat);
            panel.position.y = -0.1;
            const pLight = new THREE.PointLight(0xfffbeb, 0, 25);
            pLight.position.y = -1; pLight.castShadow = true;
            group.add(casing, panel, pLight);
            return { parent: group, panelMat: panelMat, source: pLight };
        }

        // --- 3. BUILD ROOMS (Side-by-Side on X Axis) ---
        const roomConfigs = [
            { name: 'Drawing Room', xOffset: -16, color: '#18181b' },
            { name: 'Work Room 1', xOffset: 0, color: '#27272a' },
            { name: 'Work Room 2', xOffset: 16, color: '#18181b' }
        ];

        const deviceRefs = {};

        // Create a massive master floor beneath everything
        const masterFloor = new THREE.Mesh(
            new THREE.PlaneGeometry(80, 40),
            new THREE.MeshStandardMaterial({ color: '#09090b' })
        );
        masterFloor.rotation.x = -Math.PI / 2;
        masterFloor.position.y = -0.1;
        scene.add(masterFloor);

        roomConfigs.forEach(room => {
            const rGroup = new THREE.Group();
            
            // Room Floor Pad (15 wide, 18 deep)
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(15, 18), new THREE.MeshStandardMaterial({ color: room.color }));
            floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
            rGroup.add(floor);

            // Walls to separate rooms side-by-side
            const wallMat = new THREE.MeshStandardMaterial({ color: '#3f3f46' });
            
            // Back Wall
            const backWall = new THREE.Mesh(new THREE.BoxGeometry(15, 4, 0.5), wallMat);
            backWall.position.set(0, 2, -9); backWall.receiveShadow = true; rGroup.add(backWall);
            
            // Side Wall (Only draw left walls to act as dividers)
            if (room.name !== 'Drawing Room') {
                const dividerWall = new THREE.Mesh(new THREE.BoxGeometry(0.5, 4, 18), wallMat);
                dividerWall.position.set(-7.5, 2, 0); dividerWall.receiveShadow = true; rGroup.add(dividerWall);
            }

            // 3D Room Label
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#a1a1aa'; 
            ctx.font = 'bold 42px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(room.name.toUpperCase(), 256, 80);
            const tex = new THREE.CanvasTexture(canvas);
            const label = new THREE.Mesh(new THREE.PlaneGeometry(8, 2), new THREE.MeshBasicMaterial({ map: tex, transparent: true }));
            label.rotation.x = -Math.PI / 2; label.position.set(0, 0.05, 7);
            rGroup.add(label);

            // 2 Fans per room
            [[-3.5, 5, -4], [3.5, 5, 2]].forEach((pos, i) => {
                const fan = createFan(); fan.parent.position.set(...pos); rGroup.add(fan.parent);
                deviceRefs[`${room.name}-Fan-${i + 1}`] = { type: 'Fan', isOn: false, rotor: fan.spinner };
            });

            // 3 Lights per room
            [[-5, 5, -7], [0, 5, -1], [5, 5, -7]].forEach((pos, i) => {
                const light = createLight(); light.parent.position.set(...pos); rGroup.add(light.parent);
                deviceRefs[`${room.name}-Light-${i + 1}`] = { type: 'Light', isOn: false, panel: light.panelMat, source: light.source };
            });

            // Position rooms along the X axis
            rGroup.position.set(room.xOffset, 0, 0);
            scene.add(rGroup);
        });

        // --- 4. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            for (const key in deviceRefs) {
                if (deviceRefs[key].type === 'Fan' && deviceRefs[key].isOn) {
                    deviceRefs[key].rotor.rotation.y -= 0.15; 
                }
            }
            renderer.render(scene, camera);
        }
        animate();

        // Ensure canvas resizes perfectly with center stage
        window.addEventListener('resize', () => {
            const aspect = container.clientWidth / container.clientHeight;
            camera.left = -d * aspect; camera.right = d * aspect;
            camera.top = d; camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // --- 5. LOGIC & DATA BINDING ---
        let previousState = {}; 
        const notifList = document.getElementById('notification-list');
        const listContainer = document.getElementById('room-list');

        function formatTime(date) {
            let hours = date.getHours();
            let minutes = date.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            return `${hours}:${minutes} ${ampm}`;
        }

        async function fetchLiveStats() {
            try {
                const devRes = await fetch('/api/devices');
                const devices = await devRes.json();
                const statRes = await fetch('/api/stats');
                const stats = await statRes.json();

                // Total Power
                document.getElementById('total-power').innerText = stats.totalPower + 'W';

                // --- UPDATE NOTIFICATIONS (Left Sidebar) ---
                devices.forEach(d => {
                    const prevStatus = previousState[d.id];
                    if (prevStatus && prevStatus !== d.status) {
                        const isON = d.status === 'ON';
                        const icon = d.type === 'Fan' ? '🪭' : '💡';
                        const colorClass = isON ? 'on' : 'off';
                        const textHighlight = isON ? 'highlight-on' : 'highlight-off';
                        const cleanName = d.id.split('-').slice(1).join(' '); 
                        const timeStr = formatTime(new Date());

                        const notifHTML = `
                            <div class="notif-item">
                                <div class="notif-icon ${colorClass}">${icon}</div>
                                <div class="notif-text">
                                    <div class="notif-title">${d.room} <br> ${cleanName} turned <span class="${textHighlight}">${d.status}</span></div>
                                    <div class="notif-time">🕒 ${timeStr}</div>
                                </div>
                            </div>
                        `;
                        notifList.insertAdjacentHTML('afterbegin', notifHTML);
                        if(notifList.children.length > 20) notifList.lastElementChild.remove();
                    }
                    previousState[d.id] = d.status; 
                });

                // --- UPDATE ROOM STATUS (Right Sidebar) ---
                const groupedByRoom = { 'Drawing Room': [], 'Work Room 1': [], 'Work Room 2': [] };
                devices.forEach(d => groupedByRoom[d.room].push(d));

                let sidebarHTML = '';
                for (const [roomName, roomDevs] of Object.entries(groupedByRoom)) {
                    sidebarHTML += `
                        <div class="room-card">
                            <div class="room-header">
                                <span class="room-icon">🚪</span> ${roomName}
                            </div>
                            <div class="device-list">`;
                    
                    roomDevs.forEach(d => {
                        const isON = d.status === 'ON';
                        const statusClass = isON ? 'on' : 'off';
                        const icon = d.type === 'Fan' ? '🪭' : '💡';
                        const cleanName = d.id.split('-').slice(1).join(' '); 

                        sidebarHTML += `
                            <div class="device-row">
                                <div class="device-info">
                                    <span class="device-icon" style="opacity: ${isON ? '1' : '0.4'}">${icon}</span>
                                    <span class="device-name">${cleanName}</span>
                                </div>
                                <div class="device-status ${statusClass}">${d.status}</div>
                            </div>`;
                    });
                    sidebarHTML += `</div></div>`;
                }
                listContainer.innerHTML = sidebarHTML;

                // --- UPDATE 3D MODELS ---
                devices.forEach(d => {
                    const devRef = deviceRefs[d.id];
                    if (devRef) {
                        const isOn = d.status === 'ON';
                        devRef.isOn = isOn;
                        if (devRef.type === 'Light') {
                            devRef.panel.emissiveIntensity = isOn ? 1.5 : 0;
                            devRef.source.intensity = isOn ? 120 : 0; 
                        }
                    }
                });
            } catch (error) { console.error("Data fetch error:", error); }
        }

        setInterval(fetchLiveStats, 1000);
        fetchLiveStats();
    </script>
</body>
</html>
